<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta name="description" content="Learning to logo creation">
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>SVG Images </title>
    <!--tab logo -->
    <link rel="icon" href="./Images/ajith1.jpg">
   
</head>

<body>
    <h1 class="svg-image"> Seclar vector Graphics (SVG)</h1>

    <div class="circle">
        <h3>Circle Image</h3>
        <svg height="100" width="100">
            <circle cx="50" cy="50" r="40" fill="red" />
        </svg>

        <h3>Rectangle Image</h3>
        <svg height="100" width="100">
            <rect width="500" height="100" fill="tomato" />
        </svg>

        <h3>My logo </h3>

        <svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Ellipse -->
            <ellipse cx="200" cy="100" rx="150" ry="70" fill="blue" stroke="black" stroke-width="3"/>
            <!-- Text -->
            <text x="200" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="white"
                font-weight="bold">
                Saravanan
            </text>

        </svg>

    </div>
</body>

</html>
