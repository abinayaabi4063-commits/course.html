    <!DOCTYPE html>
<html>
    <head>
        <title>Global Attributes</title>
    </head>
    <body>
        <!--ID - unique -->
        <p id="welcome-msg" tabindex="1">Hello Welcome to HTML world</p>
        <h1 id="h1-welcome-msg" tabindex="2">Hello CSS world</h1>
        <div id="container" tabindex="3">I am container </div>


        <!-- Class - Not-unique -->
         <p class="text-white text-bg-red" tabindex="6">I am class Attributes</p>
         <h1 class="bg-pink text-white" tabindex="7">I am a class attributes </h1>

        
        <!-- style -  inline-css -->
         <p style="color:white;background-color: tomoto;" tabindex="4"> Hello Style attribute </p>
         <h1 style="color:white;background-color: pink;" tabindex="5">I am style Attribute</h1>

        <!--title - abservation tooltip-->
        <p> <span title="TATA Consultancy Services" tabindex="8">TCS</span> is No1. Service based Company</p>


        <!--contenteditable true/false -->
        <p contenteditable="true" tabindex="9"> Hello My self saravanan </p>






    </body>
</html>
