<!DOCTYPE html>
<html>

<head>
    <title> Order List Example</title>

</head>

<body>
    <h1> Order List Example </h1>
    <div class="flower list">

        <ol class="flowers">
            <li>rose</li>
            <li>alli</li>
        </ol>
        <ol class="flower list" start="100">
            <li>rose</li>
            <li>alli</li>
        </ol>
         <ol class="flowers" type="A">
            <li>rose</li>
            <li>alli</li>
        </ol>
         <ol class="flowers" type="a">
            <li>rose</li>
            <li>alli</li>
        </ol>

         <ol class="flowers" type="I">
            <li>rose</li>
            <li>alli</li>
        </ol>
         <ol class="flowers" type="i">
            <li>rose</li>
            <li>alli</li>
        </ol>
    </div>
</body>
</html>
