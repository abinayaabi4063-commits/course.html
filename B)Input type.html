<!DOCTYPE html>
<html>
<head>
    
    <title>Input Types</title>
   
</head>
<body>
        <div>
            <label for="text-input">Candidate Name</label>
             <input 
                type="text"
                name="sample-text"
                id="text-input"
                value =""
                max="99"
            />
        </div>

        <div>
            <label for="credital">password</label>
            <input 
                type="password"
                name="sample-text"
                id=""
                value =""
            />
        </div>

        <div>
            <label for="">Email</label>
            <input 
                type="email"
                name="sample-text"
                id=""
                value =""
            />
        </div>

        <div>
            <label for="">dob</label>
            <input 
                type="date"
                name="sample-text"
                id=""
                value =""
                max="2026-03-27"
               
            />
        </div>


         <div>
            <label for="">date with time</label>
            <input 
                type="datetime-local"
                name="sample-text"
                id=""
                value =""
                
            />
        </div>


        <div>
            <label for="">Number</label>
            <input 
                type="number"
                name="sample-text"
                id=""
            />
        </div>
        

         <div>
            <label for="">Tel</label>
            <input 
                type="tel"
                name="sample-text"
                id=""
                pattern="[0-9]{10}"
            />
        </div>

         <div>
            <label for="">check box</label>
            <input 
                type="checkbox"
                name="sample-text"
                id=""
                value="tamil"
            /> Tamil
        </div>

        <div>
            <label for="">check box auto checked</label>
            <input 
                type="checkbox"
                name="sample-text"
                id=""
                value="tamil"
                checked
            /> Tamil
        </div>
       
        <div>
            <label for="">check box auto checked</label>
            <input 
                type="radio"
                name="sample-text"
                id=""
                value="tamil"
                checked
            /> male
        </div>

         <div>
            <label for="">file</label>
            <input 
                type="file"
                name="sample-text"
              
            /> 
        </div>


        <div>
             <!--normal buttons-->
            <input type="submit" value="Resiter" />
            <input type="button" value="cancel" />
            <!--semantic buttons-->
            <button type="submit">Register</button>
            <button>Cancel</button>

        </div>

        <div class="rich-text-box">
            <label for="address"> Address</label>
            <textarea 
                    name="address" 
                    id="address" 
                    rows ="10"
                    cols = "50"
            ></textarea>
        </div>

        <div class="select-box">

            <label for="country">country</label>
            <select name="country" id="country">
                <option value="">america</option>
                <option value="india">india</option>
                <option value="russia">russia</option>
            </select>
        </div>
